<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
       <div class="login-card">
          <h2>Login</h2>
          <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="password" required>
                <p id="message"></p>
            </div>
        <div class="options">
            <label><input type="checkbox"> Remember Password</label>
            <a href="#" class="forget">Forget Password?</a>
        </div>

        <button type="submit" class="LoginBottom">Login</button>
    </form>
    
    <div class="footer-text">
        <p>No account yet? <a href="#">Register</a></p>
    </div>
 <div class="social-login">

 <div class="icon-circle">
    <i class="fa-brands fa-apple apple"></i>
</div>

<div class="icon-circle">
    <i class="fa-brands fa-twitter twitter"></i>
</div>

<div class="icon-circle">
    <i class="fa-brands fa-facebook facebook"></i>
</div>

<div class="icon-circle">
    <i class="fa-brands fa-google google"></i>
</div>

</div>
        </div>
        <div class="person">
        <img src="./photo/person.jpeg" alt="">
       </div>
    </div>

<script src="script.js"></script> 
</body>
</html>
